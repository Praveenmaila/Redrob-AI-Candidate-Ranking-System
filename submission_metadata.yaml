ai_usage_summary: |
  Used Claude for architecture discussion, code review, and debugging.
  Used GitHub Copilot for autocomplete. No candidate data was fed to any LLM.
  All ranking logic is deterministic and does not use LLM inference.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal ranking engine combining behavioral platform signals (45%),
  availability scoring (15%), skill assessments (15%), GitHub activity (10%),
  experience years (10%), and AI-skill boost (5%) with a honeypot penalty.
  Semantic matching uses SentenceTransformers (all-MiniLM-L6-v2) embeddings
  with per-field weighting (summary 60%, career 25%, headline 15%).
  A prefilter keeps the top 2000 candidates by baseline+skill-overlap score
  before expensive embedding, keeping runtime under 3 minutes on CPU.
  Final score: 50% semantic + 50% baseline. Deterministic, factual reasoning
  is generated per candidate citing only profile data. Full Next.js frontend
  with glassmorphism UI provides upload, progress tracking, and explainable
  results with score breakdowns.

